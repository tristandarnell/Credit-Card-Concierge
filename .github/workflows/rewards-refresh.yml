name: Rewards Refresh

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Collect reward data
        run: ENABLE_DISCOVERY=1 ENABLE_SITEMAP_DISCOVERY=1 MAX_DISCOVERED_SOURCES=3000 MAX_FETCH_SOURCES=1200 FETCH_CONCURRENCY=8 REQUEST_DELAY_MS=100 npm run rewards:collect

      - name: Commit data update
        run: |
          if [[ -n "$(git status --porcelain data/rewards/cards.us.json data/rewards/sources.discovered.us.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/rewards/cards.us.json data/rewards/sources.discovered.us.json
            git commit -m "chore(data): monthly rewards refresh"
            git push
          else
            echo "No changes in rewards dataset"
          fi

      - name: Sync to Supabase
        if: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_REWARDS_TABLE: credit_card_rewards
        run: npm run rewards:sync
